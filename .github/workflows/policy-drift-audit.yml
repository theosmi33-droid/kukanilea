name: Policy Drift Audit

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  policy-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run branch protection drift audit
        env:
          POLICY_AUDIT_TOKEN: ${{ secrets.POLICY_AUDIT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          POLICY_BASELINE_PATH: .github/policy/branch_protection_baseline.json
        run: |
          python scripts/ops/policy_drift_audit.py
