name: KUKANILEA CI Corridor

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main, "codex/**"]
  workflow_dispatch:

concurrency:
  group: ci-corridor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-corridor:
    name: smoke (lint + unit-smoke + healthcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
      BOOTSTRAP_SKIP_PLAYWRIGHT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python from .python-version
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"

      - name: Bootstrap environment
        run: make bootstrap

      - name: Lint
        run: ./.build_venv/bin/ruff check .

      - name: Unit smoke
        run: ./.build_venv/bin/pytest -q tests --ignore=tests/e2e

      - name: Healthcheck
        run: ./scripts/ops/healthcheck.sh --ci

  full-validation:
    name: full validation suite
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [smoke-corridor]
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
      BOOTSTRAP_SKIP_PLAYWRIGHT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python from .python-version
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"

      - name: Bootstrap environment
        run: make bootstrap

      - name: Full tests (excluding e2e)
        run: ./.build_venv/bin/pytest -q tests --ignore=tests/e2e
