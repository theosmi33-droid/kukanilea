name: KUKANILEA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "13 4 * * *"
  workflow_dispatch:
    inputs:
      run_perf_gate:
        description: "Run optional perf KPI gate job"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      run_perf_gate:
        description: "Run optional perf KPI gate job"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  pr-quality-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR quality guard
        run: |
          bash scripts/dev/pr_quality_guard.sh --ci

  ui-conflict-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pr-quality-guard]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce scoped ownership + merge order gate
        run: |
          python scripts/dev/ui_conflict_preventer.py --base-branch origin/main

  lint-and-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BANDIT_SEVERITY_LEVEL: medium
      BANDIT_CONFIDENCE_LEVEL: medium
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright Chromium (strict doctor prerequisite)
        run: |
          python -m playwright install chromium
          pip install bandit pyyaml

      - name: Validate workflow YAML syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          workflows = sorted(Path(".github/workflows").glob("*.yml"))
          assert workflows, "no workflow files found"
          for wf in workflows:
              with wf.open("r", encoding="utf-8") as fh:
                  yaml.safe_load(fh)
          print(f"validated {len(workflows)} workflow files")
          PY

      - name: Compile sanity
        run: |
          python -m compileall app kukanilea run.py kukanilea_app.py

      - name: Guardrails scan (offline/CSP/no-injection surface)
        run: |
          python scripts/ops/verify_guardrails.py

      - name: Security scan report (policy-driven)
        id: bandit_scan
        continue-on-error: true
        run: |
          case "${BANDIT_SEVERITY_LEVEL,,}" in
            low) severity_flag="-l" ;;
            medium) severity_flag="-ll" ;;
            high) severity_flag="-lll" ;;
            *) echo "Invalid BANDIT_SEVERITY_LEVEL=${BANDIT_SEVERITY_LEVEL}" >&2; exit 2 ;;
          esac

          case "${BANDIT_CONFIDENCE_LEVEL,,}" in
            low) confidence_flag="-i" ;;
            medium) confidence_flag="-ii" ;;
            high) confidence_flag="-iii" ;;
            *) echo "Invalid BANDIT_CONFIDENCE_LEVEL=${BANDIT_CONFIDENCE_LEVEL}" >&2; exit 2 ;;
          esac

          echo "Bandit policy threshold: severity>=${BANDIT_SEVERITY_LEVEL}, confidence>=${BANDIT_CONFIDENCE_LEVEL}"
          target_label=""
          if [[ "${GITHUB_EVENT_NAME:-}" == "pull_request" ]]; then
            base_ref="origin/${GITHUB_BASE_REF:-main}"
            git fetch --no-tags origin "${GITHUB_BASE_REF:-main}:${GITHUB_BASE_REF:-main}" || true
            mapfile -t py_targets < <(git diff --name-only "${base_ref}...HEAD" -- '*.py' ':!app/static/**')
            target_label="pull_request_diff"
          else
            before_sha="$(python -c 'import json, os; from pathlib import Path
event_path = os.environ.get("GITHUB_EVENT_PATH", "")
if not event_path:
    raise SystemExit(0)
event = json.loads(Path(event_path).read_text(encoding="utf-8"))
before = (event.get("before") or "").strip()
if before and set(before) != {"0"}:
    print(before)
')"
            if [[ -n "${before_sha}" ]]; then
              echo "Using push range ${before_sha}...HEAD"
              git cat-file -e "${before_sha}^{commit}" 2>/dev/null || git fetch --no-tags origin "${before_sha}" || true
            fi

            if [[ -n "${before_sha}" ]] && git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
              mapfile -t py_targets < <(git diff --name-only "${before_sha}...HEAD" -- '*.py' ':!app/static/**')
            elif [[ -n "${before_sha}" ]]; then
              echo "Could not resolve before SHA; scanning all tracked Python files as a safe fallback."
              mapfile -t py_targets < <(git ls-files '*.py' ':!app/static/**')
            else
              mapfile -t py_targets < <(git ls-files '*.py' ':!app/static/**')
            fi
            target_label="push_delta"
          fi

          if [[ "${#py_targets[@]}" -eq 0 ]]; then
            echo "No Python changes detected for ${target_label}; Bandit gate passes without findings scan." > bandit-report.txt
            echo "bandit_exit_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf "%s\n" "${py_targets[@]}" > bandit-targets.txt
          echo "Bandit target mode: ${target_label} (${#py_targets[@]} files)"
          cat bandit-targets.txt

          set +e
          bandit ${severity_flag} ${confidence_flag} -f txt -o bandit-report.txt "${py_targets[@]}"
          bandit_exit_code=$?
          set -e

          if [ "$bandit_exit_code" -ne 0 ]; then
            echo "Bandit policy violation detected. See bandit-report.txt artifact for details."
          else
            echo "Bandit passed configured policy threshold."
          fi

          echo "bandit_exit_code=${bandit_exit_code}" >> "$GITHUB_OUTPUT"

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-lint-and-scan
          path: bandit-report.txt

      - name: Enforce Bandit policy gate
        if: always()
        run: |
          if [ "${{ steps.bandit_scan.outputs.bandit_exit_code }}" != "0" ]; then
            echo "Blocking merge: Bandit findings exceed configured policy threshold (severity>=${BANDIT_SEVERITY_LEVEL}, confidence>=${BANDIT_CONFIDENCE_LEVEL})." >&2
            exit 1
          fi

  agent-logic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-and-scan]
    env:
      OLLAMA_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright Chromium (strict doctor prerequisite)
        run: |
          python -m playwright install chromium

      - name: Healthcheck core gates (without duplicate pytest run)
        run: |
          bash scripts/ops/healthcheck.sh --skip-pytest --strict-doctor

      - name: Run contract and smoke bundles
        run: |
          pytest -q tests/contracts tests/integration/test_end_to_end_core_smoke.py

      - name: Run selected core tests
        run: |
          pytest -q tests/test_memory_system.py tests/test_rag_pipeline.py tests/test_lexoffice.py tests/test_error_ux.py

  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-quality-guard, ui-conflict-guard, pip-audit-gate]
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Audit production dependency pinning policy
        run: |
          python - <<'PY'
          from pathlib import Path

          req = Path("requirements.txt")
          violations = []
          for idx, raw in enumerate(req.read_text().splitlines(), start=1):
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue
              if "==" not in line:
                  violations.append(f"Line {idx}: {raw}")

          if violations:
              raise SystemExit(
                  "Unpinned production dependencies found:\n" + "\n".join(violations)
              )
          print("requirements.txt production dependencies are fully pinned.")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install bandit pyyaml

      - name: Validate workflow YAML syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          workflows = sorted(Path(".github/workflows").glob("*.yml"))
          assert workflows, "no workflow files found"
          for wf in workflows:
              with wf.open("r", encoding="utf-8") as fh:
                  yaml.safe_load(fh)
          print(f"validated {len(workflows)} workflow files")
          PY

      - name: Compile sanity
        run: |
          python -m compileall app kukanilea run.py kukanilea_app.py

      - name: Install Playwright Chromium (strict doctor prerequisite)
        run: |
          python -m playwright install chromium

      - name: Guardrails scan (offline/CSP/no-injection surface)
        run: |
          python scripts/ops/verify_guardrails.py

      - name: Healthcheck core gates (without duplicate pytest run)
        run: |
          bash scripts/ops/healthcheck.sh --skip-pytest --strict-doctor

      - name: Contract + smoke regression bundle
        run: |
          python -m pytest -q \
            tests/contracts \
            tests/security/test_verify_guardrails.py \
            tests/security/test_layout_shell_hardening.py \
            tests/integration/test_end_to_end_core_smoke.py

      - name: Security scan report (non-blocking)
        run: |
          bandit -r app -x app/static -f txt -o bandit-report.txt || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-quality-gates
          path: bandit-report.txt

  pip-audit-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pr-quality-guard, ui-conflict-guard]
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install prod dependencies + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      - name: Build pip-audit ignore list arguments
        id: pip_audit_ignore
        shell: bash
        run: |
          ignore_args=""
          while IFS= read -r vuln_id; do
            vuln_id="${vuln_id%%#*}"
            vuln_id="${vuln_id//[[:space:]]/}"
            if [ -n "$vuln_id" ]; then
              ignore_args+=" --ignore-vuln $vuln_id"
            fi
          done < .github/pip-audit.ignore
          echo "ignore_args=$ignore_args" >> "$GITHUB_OUTPUT"

      - name: pip-audit (blocking gate for prod dependencies)
        shell: bash
        run: |
          pip-audit -r requirements.txt --strict ${{ steps.pip_audit_ignore.outputs.ignore_args }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality-gates]
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate VS Code config policy
        run: |
          python scripts/dev/enforce_vscode_configs.py --check

      - name: Run full regression tests (without e2e)
        run: |
          pytest -q tests --ignore=tests/e2e

  perf-kpi-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
      RUN_PERF_GATE: ${{ inputs.run_perf_gate || github.event.inputs.run_perf_gate || vars.CI_PERF_GATE || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Perf gate skip policy
        if: env.RUN_PERF_GATE != '1' && env.RUN_PERF_GATE != 'true'
        run: |
          echo "Skipping perf gate by policy."
          echo "Enable via workflow_dispatch input run_perf_gate=true or repository variable CI_PERF_GATE=1."

      - name: Perf benchmark harness + tests
        if: env.RUN_PERF_GATE == '1' || env.RUN_PERF_GATE == 'true'
        run: |
          python scripts/perf/benchmark_gate.py --samples 3
          pytest -q tests/perf
