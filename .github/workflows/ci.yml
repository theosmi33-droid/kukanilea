name: KUKANILEA Smoke Corridor

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main, "codex/**"]
  workflow_dispatch:

jobs:
  smoke-corridor:
    name: smoke-corridor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"

      - name: Bootstrap
        run: ./scripts/bootstrap.sh

      - name: Doctor
        run: ./scripts/doctor.sh --json > doctor-report.json

      - name: Smoke tests
        run: make test-smoke

      - name: CI gate report (pass)
        if: success()
        run: python scripts/ci/generate_ci_report.py --name smoke-corridor --status pass --command "make test-smoke"

      - name: CI gate report (fail)
        if: failure()
        run: python scripts/ci/generate_ci_report.py --name smoke-corridor --status fail --command "make test-smoke"

      - name: Upload corridor artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-corridor-${{ matrix.os }}
          path: |
            ci-report.json
            doctor-report.json
