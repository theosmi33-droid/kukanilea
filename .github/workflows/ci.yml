name: KUKANILEA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "13 4 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "1"
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Shell syntax fast-fail
        run: |
          set -euxo pipefail
          bash -n ./scripts/dev_bootstrap.sh ./scripts/dev_run.sh ./scripts/ops/healthcheck.sh

      - name: Repro bootstrap (without launch evidence)
        run: |
          set -euxo pipefail
          ./scripts/dev_bootstrap.sh --skip-launch-evidence

      - name: Focused security baseline test
        run: |
          set -euxo pipefail
          ./.venv/bin/python -m pytest -q tests/security/test_session_security_defaults.py

      - name: Full test suite (without e2e)
        run: |
          set -euxo pipefail
          ./.venv/bin/python -m pytest -q tests --ignore=tests/e2e

      - name: Validate VS Code config policy
        run: |
          set -euxo pipefail
          ./.venv/bin/python scripts/dev/enforce_vscode_configs.py --check

      - name: Upload healthcheck log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: healthcheck-log
          path: /tmp/kukanilea_healthcheck.log
          if-no-files-found: ignore
