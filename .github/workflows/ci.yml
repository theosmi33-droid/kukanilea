name: KUKANILEA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "13 4 * * *"
  workflow_dispatch:
    inputs:
      run_perf_gate:
        description: "Run optional perf KPI gate job"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr-quality-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR quality guard
        run: |
          bash scripts/dev/pr_quality_guard.sh --ci

  ui-conflict-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pr-quality-guard]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enforce scoped ownership + merge order gate
        run: |
          python scripts/dev/ui_conflict_preventer.py --base-branch origin/main

  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [pr-quality-guard, ui-conflict-guard, pip-audit-gate]
    permissions:
      contents: read
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright Chromium (strict doctor prerequisite)
        run: |
          python -m playwright install chromium

      - name: Guardrails scan (offline/CSP/no-injection surface)
        run: |
          python scripts/ops/verify_guardrails.py

      - name: Healthcheck core gates (without duplicate pytest run)
        run: |
          bash scripts/ops/healthcheck.sh --skip-pytest --strict-doctor

      - name: Contract + smoke regression bundle
        run: |
          python -m pytest -q \
            tests/contracts \
            tests/security/test_verify_guardrails.py \
            tests/security/test_layout_shell_hardening.py \
            tests/integration/test_end_to_end_core_smoke.py

  pip-audit-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [pr-quality-guard, ui-conflict-guard]
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install prod dependencies + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      - name: Build pip-audit ignore list arguments
        id: pip_audit_ignore
        shell: bash
        run: |
          ignore_args=""
          while IFS= read -r vuln_id; do
            vuln_id="${vuln_id%%#*}"
            vuln_id="${vuln_id//[[:space:]]/}"
            if [ -n "$vuln_id" ]; then
              ignore_args+=" --ignore-vuln $vuln_id"
            fi
          done < .github/pip-audit.ignore
          echo "ignore_args=$ignore_args" >> "$GITHUB_OUTPUT"

      - name: pip-audit (blocking gate for prod dependencies)
        shell: bash
        run: |
          pip-audit -r requirements.txt --strict ${{ steps.pip_audit_ignore.outputs.ignore_args }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality-gates]
    permissions:
      contents: read
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate VS Code config policy
        run: |
          python scripts/dev/enforce_vscode_configs.py --check

      - name: Run full regression tests (without e2e)
        run: |
          pytest -q tests --ignore=tests/e2e

  perf-kpi-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      contents: read
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
      RUN_PERF_GATE: ${{ github.event.inputs.run_perf_gate || vars.CI_PERF_GATE || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Perf gate skip policy
        if: env.RUN_PERF_GATE != '1' && env.RUN_PERF_GATE != 'true'
        run: |
          echo "Skipping perf gate by policy."
          echo "Enable via workflow_dispatch input run_perf_gate=true or repository variable CI_PERF_GATE=1."

      - name: Perf benchmark harness + tests
        if: env.RUN_PERF_GATE == '1' || env.RUN_PERF_GATE == 'true'
        run: |
          python scripts/perf/benchmark_gate.py --samples 3
          pytest -q tests/perf
