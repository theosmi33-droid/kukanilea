name: Visual Regression Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "app/templates/**"
      - "app/static/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "scripts/tests/visual_regression_gate.sh"
  workflow_dispatch:

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONUNBUFFERED: "1"
      CLAMAV_OPTIONAL: "1"
      VR_ACTION_TARGET: "2400"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Run visual regression diff gate
        run: scripts/tests/visual_regression_gate.sh verify

      - name: Upload visual snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-artifacts
          path: |
            tests/e2e/*-snapshots/**
            test-results/**
