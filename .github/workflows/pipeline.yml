name: KUKANILEA Full Suite Pipeline

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main, "codex/**"]
  workflow_dispatch:

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      OLLAMA_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint and compile sanity
        run: |
          python -m compileall app run.py kukanilea_app.py
          python scripts/dev/enforce_vscode_configs.py --check

      - name: Run full tests
        run: make test-full

      - name: CI gate report (pass)
        if: success()
        run: python scripts/ci/generate_ci_report.py --name full-suite --status pass --command "make test-full"

      - name: CI gate report (fail)
        if: failure()
        run: python scripts/ci/generate_ci_report.py --name full-suite --status fail --command "make test-full"

      - name: Upload full-suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-full-suite
          path: ci-report.json
