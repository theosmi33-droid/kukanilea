name: Playwright E2E Tests

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main, "codex/**"]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          for i in 1 2 3; do
            python -m playwright install --with-deps chromium && break
            if [ "$i" -eq 3 ]; then
              echo "Playwright browser install failed after retries"
              exit 1
            fi
            sleep 5
          done

      - name: Run Playwright tests
        run: |
          pytest -q tests/e2e/test_ui_workflow.py || pytest -q tests/e2e/test_ui_workflow.py --lf
