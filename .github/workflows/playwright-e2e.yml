name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-slow-checks') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      OLLAMA_ENABLED: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          for i in 1 2 3; do
            python -m playwright install --with-deps chromium && break
            if [ "$i" -eq 3 ]; then
              echo "Playwright browser install failed after retries"
              exit 1
            fi
            sleep 5
          done

      - name: Run Playwright tests
        run: |
          pytest -q tests/e2e/test_ui_workflow.py || pytest -q tests/e2e/test_ui_workflow.py --lf
