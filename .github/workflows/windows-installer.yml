name: Build Windows Installer (RC1)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Decide if full Windows build should run
        id: gate
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -ne "pull_request") {
            "run_full=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          elseif ("${{ contains(github.event.pull_request.labels.*.name, 'run-slow-checks') }}" -eq "true") {
            "run_full=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
          else {
            "run_full=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Checkout
        if: steps.gate.outputs.run_full == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.gate.outputs.run_full == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build deps
        if: steps.gate.outputs.run_full == 'true'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller flask requests python-dotenv pydantic rapidfuzz waitress platformdirs cryptography

      - name: Validate Python sources
        if: steps.gate.outputs.run_full == 'true'
        shell: pwsh
        run: |
          python -m compileall app run.py kukanilea_app.py

      - name: Create RC artifact bundle
        if: steps.gate.outputs.run_full == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist_win | Out-Null
          Compress-Archive -Path app,run.py,kukanilea_app.py,requirements.txt -DestinationPath dist_win/KUKANILEA-rc1-source.zip -Force

      - name: Upload artifact
        if: steps.gate.outputs.run_full == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: KUKANILEA-windows-rc1-source
          path: dist_win/KUKANILEA-rc1-source.zip

      - name: Mark skipped policy path as success
        if: steps.gate.outputs.run_full != 'true'
        shell: pwsh
        run: Write-Host "Skipping Windows artifact build on pull requests without 'run-slow-checks' label."
