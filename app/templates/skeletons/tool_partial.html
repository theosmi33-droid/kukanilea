<div class="panel" style="max-width: 900px; margin: 0 auto; padding: var(--spacing-6); min-height: 320px; display: flex; flex-direction: column; justify-content: center; gap: var(--spacing-3);">
  <div style="font-size: 24px; font-weight: 700; color: var(--color-text-main); letter-spacing: -0.01em;">{{ title }}</div>
  <div style="font-size: 14px; color: var(--color-text-muted);">{{ message }}</div>
  <div style="margin-top: var(--spacing-4); display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.08em;">
    <span style="width: 8px; height: 8px; border-radius: 999px; background: var(--color-accent);"></span>
    Sovereign-11 {{ tool_key }}
  </div>
</div>
