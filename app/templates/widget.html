<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUKANILEA Assistant</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa;
            --border-color: #313244;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent;
            overflow: hidden; /* For floating effect */
        }
        #widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 500px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        .header {
            padding: 15px;
            background-color: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border-color);
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }
        .chat-area {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }
        .message.user {
            align-self: flex-end;
            background-color: var(--accent-color);
            color: #11111b;
            border-bottom-right-radius: 2px;
        }
        .message.ai {
            align-self: flex-start;
            background-color: #313244;
            border-bottom-left-radius: 2px;
        }
        .input-area {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #11111b;
            color: var(--text-color);
            outline: none;
        }
        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: #11111b;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="widget-container">
    <div class="header">
        <span>KUKANILEA KI (Lokal)</span>
        <span style="font-size: 10px; color: #a6adc8;">SECURE</span>
    </div>
    <div class="chat-area" id="chat">
        <div class="message ai">Hallo! Ich bin deine lokale Handwerks-KI. Wie kann ich heute helfen? (Alle Daten bleiben hier auf deinem Rechner).</div>
    </div>
    <div class="input-area">
        <input type="text" id="prompt" placeholder="Frage etwas..." onkeypress="if(event.key === 'Enter') sendPrompt()">
        <button onclick="sendPrompt()">Senden</button>
    </div>
</div>

<script src="/static/js/widget.js"></script>
</body>
</html>
