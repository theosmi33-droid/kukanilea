<div id="ki-chat-widget" class="ki-chat-widget">
  <div id="ki-chat-window" class="ki-chat-window" role="dialog" aria-modal="false" aria-labelledby="ki-chat-title" aria-describedby="chat-messages" aria-hidden="true">
    <div class="ki-chat-header">
      <div class="ki-chat-title-wrap">
        <div class="ki-chat-presence-indicator" aria-hidden="true"></div>
        <span id="ki-chat-title" class="ki-chat-title">KI Assistent</span>
      </div>
      <button id="ki-chat-close" class="ki-chat-close" aria-label="KI-Chat schließen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div id="chat-messages" class="ki-chat-messages" role="log" aria-live="polite" aria-relevant="additions text">
      <div class="ki-chat-bubble ki-chat-bubble-assistant">
        Guten Tag! Wie kann ich Ihnen heute bei Ihren Aufgaben oder Dokumenten behilflich sein?
      </div>
    </div>
    <div id="chat-plan" class="ki-chat-meta"></div>
    <div id="chat-actions" class="ki-chat-meta"></div>
    <form class="ki-chat-composer" aria-label="Nachricht an KI-Assistent senden">
      <input type="text" id="chat-input" aria-label="Nachricht an KI-Assistent" placeholder="Nachricht schreiben...">
      <button id="chat-send-btn" class="ki-chat-send" aria-label="Nachricht senden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </button>
    </form>
  </div>
  <button id="ki-chat-toggle" class="ki-chat-toggle" aria-label="KI-Chat öffnen oder schließen" aria-controls="ki-chat-window" aria-expanded="false">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
</div>
