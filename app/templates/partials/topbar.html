<header class="topbar" aria-label="Seitenkopf">
  <div class="topbar-main-row">
    <div class="topbar-leading">
      <button id="mobile-sidebar-toggle" class="btn btn-ghost btn-sm mobile-sidebar-toggle" type="button" aria-label="Menü öffnen" aria-controls="app-sidebar" aria-expanded="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 style="font-size: 1.05rem; font-weight: 700; margin: 0; color: var(--text-primary);">
        {% block context_title %}{{ branding.app_name if branding else 'KUKANILEA' }}{% endblock %}
      </h1>
    </div>

    <div class="topbar-search-container" aria-label="Suche">
      <label for="topbar-search" class="sr-only">Systemweite Suche</label>
      <svg class="topbar-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="topbar-search" type="search" class="topbar-search-input" placeholder="Search anything… (⌘K)" aria-label="Systemweite Suche">
    </div>

    <div class="topbar-actions">
      {% include 'components/system_status.html' %}

      <button type="button" class="btn btn-ghost btn-sm topbar-icon-btn" aria-label="Benachrichtigungen" title="Benachrichtigungen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/static/icons/sprite.svg#icon-notifications"></use></svg>
      </button>

      <a href="/settings?mode=profile" class="btn btn-ghost btn-sm topbar-profile" aria-label="Profil öffnen" title="Profil öffnen">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/static/icons/sprite.svg#icon-profile"></use></svg>
        <span>{{ user if user and user != '-' else 'Profil' }}</span>
      </a>
    </div>
  </div>

  <div class="context-panels" aria-label="Context panels">
    <section class="context-panel">
      <p class="context-panel-label">Current Context</p>
      <p class="context-panel-value">{{ request.path }}</p>
    </section>
    <section class="context-panel">
      <p class="context-panel-label">Fast Switch</p>
      <p class="context-panel-value">⌥ + 1…7</p>
    </section>
    <section class="context-panel">
      <p class="context-panel-label">Primary Action</p>
      <p class="context-panel-value">Cmd/Ctrl + K</p>
    </section>
  </div>
</header>
