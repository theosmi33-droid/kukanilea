<header class="top-header" aria-label="Seitenkopf">
  <div class="flex items-center gap-4">
    <button id="mobile-sidebar-toggle" class="btn btn-ghost btn-sm mobile-only" type="button" aria-label="Menü öffnen">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="text-lg font-bold m-0 text-main">
      {% block context_title %}{{ branding.app_name if branding else 'KUKANILEA' }}{% endblock %}
    </h1>
  </div>

  <div class="topbar-search-container desktop-only" aria-label="Suche">
    <svg class="topbar-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="search" class="topbar-search-input" placeholder="Suchen (⌘ K)..." aria-label="Systemweite Suche">
  </div>

  <div class="topbar-actions flex items-center gap-2">
    {% include 'components/system_status.html' %}
    
    <div class="divider-v"></div>

    {% if roles in ['DEV', 'ADMIN'] and all_tenants %}
    <div class="flex items-center gap-2">
        <span class="label-xs">Mandant:</span>
        <select class="form-select-sm" 
                name="tenant_id"
                hx-post="/admin/context/switch"
                hx-confirm="Mandanten-Kontext wirklich wechseln?"
                hx-trigger="change">
            <option value="SYSTEM" {{ 'selected' if active_tenant_id == 'SYSTEM' }}>SYSTEM</option>
            {% for t in all_tenants %}
            <option value="{{ t.id }}" {{ 'selected' if active_tenant_id == t.id }}>{{ t.name }}</option>
            {% endfor %}
        </select>
    </div>
    {% endif %}

    <span class="badge badge-secondary desktop-only">White Mode</span>
  </div>
</header>

<style>
  .top-header {
      justify-content: space-between;
  }
  .divider-v {
      height: 1.5rem;
      width: 1px;
      background-color: var(--border-light);
      margin: 0 var(--space-2);
  }
  .label-xs {
      font-size: 10px;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
  }
  .form-select-sm {
      height: 2rem;
      padding: 0 var(--space-2);
      font-size: 12px;
      background-color: var(--neutral-50);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
  }
  .mobile-only { display: none; }
  @media (max-width: 768px) {
    .mobile-only { display: block; }
    .desktop-only { display: none; }
  }
</style>
