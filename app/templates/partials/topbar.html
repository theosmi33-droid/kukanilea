<header class="topbar" aria-label="Seitenkopf">
  <div class="topbar-leading">
    <button id="mobile-sidebar-toggle" class="btn btn-ghost btn-sm mobile-sidebar-toggle" type="button" aria-label="Menü öffnen" aria-controls="app-sidebar" aria-expanded="false">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-title-group">
      <p class="topbar-eyebrow">AI OS</p>
      <h1 class="topbar-title">
        {% block context_title %}{{ branding.app_name if branding else 'KUKANILEA' }}{% endblock %}
      </h1>
    </div>
  </div>

  <button id="topbar-search-trigger" type="button" class="topbar-search-container" aria-label="Command Palette öffnen (⌘ K)">
    <svg class="topbar-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <span class="topbar-search-placeholder">Fragen, Tools, Navigation…</span>
    <kbd class="topbar-shortcut">⌘K</kbd>
  </button>

  <div class="topbar-actions">
    {% include 'components/system_status.html' %}

    {% if roles in ['DEV', 'ADMIN'] and all_tenants %}
    <label class="tenant-switch" aria-label="Aktiver Mandant">
      <span>Mandant</span>
      <select class="form-select"
              name="tenant_id"
              hx-post="/admin/context/switch"
              hx-confirm="Mandanten-Kontext wirklich wechseln?"
              hx-trigger="change"
              aria-label="Aktiver Mandant">
          <option value="SYSTEM" {{ 'selected' if active_tenant_id == 'SYSTEM' }}>SYSTEM</option>
          {% for t in all_tenants %}
          <option value="{{ t.id }}" {{ 'selected' if active_tenant_id == t.id }}>{{ t.name }}</option>
          {% endfor %}
      </select>
    </label>
    {% endif %}

    <span class="mode-chip" aria-label="Farbmodus">White Mode</span>
  </div>
</header>
