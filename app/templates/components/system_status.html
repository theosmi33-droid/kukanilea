<div id="system-status-indicator" 
     hx-get="/api/system/status" 
     hx-trigger="every 5s" 
     hx-swap="outerHTML"
     style="display:flex; align-items:center; gap:10px; padding:6px 14px; border-radius:99px; background:rgba(255,255,255,0.05); border:1px solid var(--color-border); font-size:11px; font-weight:700; color:var(--text-tertiary);">
    
    {% if status == 'HEALTHY' %}
    <div style="width:8px; height:8px; border-radius:50%; background:var(--color-success); box-shadow:0 0 8px var(--color-success);"></div>
    <span style="color:var(--color-success);">System Gesund</span>
    {% elif status == 'WARNING_SYNC' %}
    <div style="width:8px; height:8px; border-radius:50%; background:var(--color-warning); box-shadow:0 0 8px var(--color-warning);"></div>
    <span style="color:var(--color-warning);">Sync Fehler ({{ sync_queue.failed }})</span>
    {% else %}
    <div style="width:8px; height:8px; border-radius:50%; background:var(--color-danger); box-shadow:0 0 8px var(--color-danger);"></div>
    <span style="color:var(--color-danger);">{{ status }}</span>
    {% endif %}
    
    <div style="height:12px; width:1px; background:var(--color-border); margin:0 4px;"></div>
    
    <span style="font-family:monospace; color:var(--text-tertiary);">CPU: {{ cpu_usage_pct|default(0)|round(1) }}%</span>
    <span style="font-family:monospace; color:var(--text-tertiary);">RAM: {{ memory_rss_mb|default(0)|round(0) }}MB</span>

    <!-- Task GoBD: Outbound Status Badges -->
    <span id="outbound-status-badges" style="display:flex; align-items:center; gap:6px; margin-left: 8px;"></span>
</div>
